# This docker-compose file is used to run the MCP API service.
# It builds the Docker image from the specified Dockerfile and runs the service.
# The mcp service listens on port 8000 and with host network mode, will be directly accessible over same port on the host machine.
# It also includes a health check to ensure the service is running correctly.

## You're seeing this because your MCP server inside the container is listening on 127.0.0.1:8000 only:
## - Uvicorn running on http://127.0.0.1:8000
## When Docker maps 40027 -> 8000, traffic arrives on the container's eth0. But a process bound to 127.0.0.1 (container loopback) won't accept connections that arrive via eth0. 
## The result observed is like: 
## - curl http://localhost:40028 (→ container:8001) works because your health server is listening on 0.0.0.0:8001 (or you published correctly), so you get a 404 on / (as expected).
## - curl http://localhost:40027 (→ container:8000) hits Docker’s NAT, but no listener on the container’s external interface for port 8000 → RST ("Recv failure: Connection reset by peer").
## But, with host netork mode, the container shares the host's network stack, so binding to its loopback interface (127.0.0.1) inside the container is effectively binding to the host's loopback interface.

services: 
  mcp_api: 
    build: 
      # Adjust context to root directory where src and conda.yml are located.
      context: ..
      dockerfile: dockers/Dockerfile
    ## host network mode: it's a test if intent is to expose docker related ports on host machine directly
    ## challenge is it won't scale for cloud or cross-server communications
    # network_mode: "host"
    ports: 
      - "40027:8000" # MCP API port
      - "40028:8001" # Health check port
    restart: always
    shm_size: '64gb'
    # volumes:
    #   - ~/.azure:/root/.azure
    healthcheck:
      test: [
              "CMD-SHELL", 
              "curl -fsS -o /dev/null http://localhost:8001/healthz"
            ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s # Give the app time to start before Docker begins evaluating health
